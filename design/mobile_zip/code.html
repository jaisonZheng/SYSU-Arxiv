<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>上传 - SYSU-Arxiv</title>

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-950 docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows flex justify-between items-center w-full px-4 h-16 sticky z-50">
<button class="text-blue-600 dark:text-blue-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors active:opacity-80 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-50">SYSU-Arxiv</div>
<button class="text-blue-600 dark:text-blue-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors active:opacity-80 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">search</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow w-full max-w-container-max mx-auto px-4 py-stack-lg mb-20 md:mb-0">
<div class="max-w-2xl mx-auto space-y-stack-lg">
<div class="space-y-stack-sm">
<h1 class="font-h1 text-h1 text-on-surface">上传资源</h1>
<p class="font-body-md text-body-md text-on-surface-variant">分享您的学术资料以帮助更多同学。</p>
</div>
<form class="space-y-gutter">
<!-- Drag and Drop Area -->
<div class="border-2 border-dashed border-outline-variant rounded-lg p-stack-lg flex flex-col items-center justify-center bg-surface-container-lowest hover:border-primary hover:bg-primary-fixed transition-colors cursor-pointer group">
<div class="bg-surface-container rounded-full p-4 mb-stack-md group-hover:bg-white transition-colors">
<span class="material-symbols-outlined text-[32px] text-outline group-hover:text-primary">upload_file</span>
</div>
<p class="font-label-md text-label-md text-on-surface mb-unit text-center">点击或拖拽文件到此处</p>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">支持 PDF, DOCX, ZIP 格式。最大文件大小: 50MB</p>
</div>
<!-- Title Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="title">资源标题</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="title" placeholder="例如：高等数学2023期末试卷" type="text"/>
</div>
<!-- Resource Type Selector -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface">资源类型</label>
<div class="grid grid-cols-2 gap-stack-md">
<label class="relative flex flex-col items-center p-stack-md border border-primary bg-primary-fixed rounded-lg cursor-pointer">
<input checked="" class="sr-only" name="resource_type" type="radio" value="single"/>
<span class="material-symbols-outlined text-primary mb-stack-sm">description</span>
<span class="font-label-md text-label-md text-on-surface">单文件</span>
<div class="absolute top-2 right-2 text-primary">
<span class="material-symbols-outlined text-[18px]">check_circle</span>
</div>
</label>
<label class="relative flex flex-col items-center p-stack-md border border-outline-variant bg-surface-container-lowest rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
<input class="sr-only" name="resource_type" type="radio" value="package"/>
<span class="material-symbols-outlined text-outline mb-stack-sm">inventory_2</span>
<span class="font-label-md text-label-md text-on-surface-variant">学习包 (ZIP)</span>
</label>
</div>
</div>
<!-- Category Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="category">分类</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-3 pr-10 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="category">
<option disabled="" selected="" value="">选择一个分类</option>
<option value="past_exams">Past Exams</option>
<option value="study_materials">Study Materials</option>
<option value="research_papers">Research Papers</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-outline">
<span class="material-symbols-outlined">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Description Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="description">描述 (可选)</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow resize-none" id="description" placeholder="简要描述资料内容、适用专业或学期..." rows="4"></textarea>
</div>
<!-- Submit Button -->
<div class="pt-stack-md">
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md text-label-md py-4 px-6 rounded-DEFAULT transition-colors flex items-center justify-center" type="submit">
<span class="material-symbols-outlined mr-2 text-[20px]">cloud_upload</span>
                        提交上传
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-white dark:bg-slate-950 docked full-width bottom-0 border-t border-t border-slate-200 dark:border-slate-800 flat no shadows fixed bottom-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 hover:text-blue-500 dark:hover:text-blue-300 scale-95 transition-transform duration-100 group w-full py-1" href="#">
<span class="material-symbols-outlined mb-1 group-hover:text-blue-500 transition-colors">home</span>
<span class="font-inter text-[10px] font-semibold">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 hover:text-blue-500 dark:hover:text-blue-300 scale-95 transition-transform duration-100 group w-full py-1" href="#">
<span class="material-symbols-outlined mb-1 group-hover:text-blue-500 transition-colors">explore</span>
<span class="font-inter text-[10px] font-semibold">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 hover:text-blue-500 dark:hover:text-blue-300 scale-95 transition-transform duration-100 group w-full py-1" href="#">
<span class="material-symbols-outlined mb-1 text-blue-600" style="font-variation-settings: 'FILL' 1;">upload_file</span>
<span class="font-inter text-[10px] font-semibold text-blue-600">Upload</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 hover:text-blue-500 dark:hover:text-blue-300 scale-95 transition-transform duration-100 group w-full py-1" href="#">
<span class="material-symbols-outlined mb-1 group-hover:text-blue-500 transition-colors">bookmark</span>
<span class="font-inter text-[10px] font-semibold">Saved</span>
</a>
</nav>
</body></html>
