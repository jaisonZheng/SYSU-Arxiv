<style>
  body {
    font-family: 'Inter', sans-serif;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);

  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex justify-center">
<div class="w-full max-w-2xl bg-surface-container-lowest min-h-screen flex flex-col relative shadow-sm border-x border-outline-variant/30">
<!-- Focused Header Exception for Form View -->
<div class="flex items-center bg-surface-container-lowest border-b border-surface-container-high px-4 py-4 sticky top-0 z-10">
<button aria-label="Go back" class="text-on-surface flex size-10 shrink-0 items-center justify-center hover:bg-surface-container-low rounded-full transition-colors" data-icon="arrow_back">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-on-surface font-h2 flex-1 text-center pr-10">Upload Contribution</h2>
</div>
<div class="flex-1 overflow-y-auto">
<div class="px-6 py-stack-lg flex flex-col items-center">
<h1 class="text-on-surface font-h1 text-center mb-2">Contribute to ScholarArchive</h1>
<p class="text-on-surface-variant font-body-md text-center mb-stack-lg max-w-md">Share your academic resources, lecture notes, or research papers with the academic community.</p>
<!-- Drag & Drop Area -->
<div class="w-full flex flex-col items-center justify-center gap-4 rounded-xl border border-dashed border-outline-variant bg-surface-container-low px-6 py-12 mb-stack-lg hover:border-primary transition-colors cursor-pointer group">
<div class="text-outline-variant group-hover:text-primary transition-colors flex h-12 items-center justify-center" data-icon="cloud_upload" data-size="48px" data-weight="regular">
<span class="material-symbols-outlined" style="font-size: 48px;">cloud_upload</span>
</div>
<div class="flex flex-col items-center gap-1 text-center">
<p class="text-on-surface font-h3">Drag &amp; Drop or Click to Upload</p>
<p class="text-on-surface-variant font-body-sm">Supported formats: PDF, DOCX, PPTX (Max 50MB)</p>
</div>
<button class="mt-2 flex items-center justify-center rounded border border-outline-variant px-4 py-2 bg-surface-container-lowest text-on-surface font-label-md hover:bg-surface-container transition-colors">
                    Browse Files
                </button>
</div>
<!-- Upload Form -->
<form class="w-full flex flex-col gap-stack-md pb-stack-lg">
<div class="flex flex-col gap-1">
<label class="text-on-surface font-label-md" for="title">Resource Title <span class="text-error">*</span></label>
<input class="w-full rounded-lg border border-outline-variant bg-surface-container-lowest px-4 py-3 text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow placeholder:text-on-surface-variant/50" id="title" placeholder="e.g., Introduction to Quantum Mechanics Notes" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-on-surface font-label-md" for="subject">Subject or Course <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full rounded-lg border border-outline-variant bg-surface-container-lowest px-4 py-3 text-on-surface font-body-md appearance-none focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" id="subject">
<option disabled="" selected="" value="">Select a subject category</option>
<option value="math">Mathematics</option>
<option value="physics">Physics</option>
<option value="cs">Computer Science</option>
<option value="bio">Biology</option>
<option value="history">History</option>
<option value="lit">Literature</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="text-on-surface font-label-md" for="description">Description (Optional)</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface-container-lowest px-4 py-3 text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow placeholder:text-on-surface-variant/50 resize-y" id="description" placeholder="Briefly describe the contents of this resource to help others find it..." rows="4"></textarea>
</div>
<button class="mt-4 w-full flex items-center justify-center rounded-lg bg-primary text-on-primary py-3 px-6 font-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm" type="button">
                    Submit Contribution
                </button>
</form>
</div>
</div>
</div>
</body></html>
