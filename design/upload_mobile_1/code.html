<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SYSU-Arxiv - Upload</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#edeeef",
                    "secondary-fixed-dim": "#c0c1ff",
                    "on-secondary-fixed-variant": "#2f2ebe",
                    "on-secondary-container": "#fffbff",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "on-primary-fixed-variant": "#004395",
                    "on-tertiary-fixed-variant": "#723600",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f8f9fa",
                    "secondary-fixed": "#e1e0ff",
                    "tertiary-container": "#b75b00",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#ffb786",
                    "on-surface": "#191c1d",
                    "on-background": "#191c1d",
                    "surface-variant": "#e1e3e4",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#fffbff",
                    "primary-container": "#2170e4",
                    "outline-variant": "#c2c6d6",
                    "surface": "#f8f9fa",
                    "tertiary-fixed": "#ffdcc6",
                    "surface-tint": "#005ac2",
                    "primary-fixed": "#d8e2ff",
                    "secondary-container": "#6063ee",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed": "#311400",
                    "on-secondary-fixed": "#07006c",
                    "surface-dim": "#d9dadb",
                    "tertiary": "#924700",
                    "inverse-surface": "#2e3132",
                    "inverse-primary": "#adc6ff",
                    "secondary": "#4648d4",
                    "on-primary-fixed": "#001a42",
                    "on-primary-container": "#fefcff",
                    "background": "#f8f9fa",
                    "surface-container-low": "#f3f4f5",
                    "primary-fixed-dim": "#adc6ff",
                    "on-surface-variant": "#424754",
                    "on-secondary": "#ffffff",
                    "outline": "#727785",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "inverse-on-surface": "#f0f1f2",
                    "primary": "#0058be",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "stack-lg": "32px",
                    "margin-page": "40px",
                    "stack-sm": "8px",
                    "container-max": "1280px",
                    "stack-md": "16px",
                    "gutter": "24px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],
                    "label-caps": ["Inter"],
                    "h3": ["Inter"],
                    "h2": ["Inter"],
                    "h1": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h3": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-20 md:pb-0">
<!-- TopAppBar -->
<header class="bg-white dark:bg-gray-950 text-blue-600 dark:text-blue-400 font-inter text-lg font-semibold tracking-tight docked full-width top-0 border-b border-b border-gray-200 dark:border-gray-800 flat no shadows flex justify-between items-center px-4 h-14 w-full sticky top-0 z-50">
<button class="text-blue-600 dark:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
</button>
<span class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">SYSU-Arxiv</span>
<button class="text-blue-600 dark:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Main Content -->
<main class="max-w-container-max mx-auto px-4 py-8">
<div class="mb-stack-lg">
<h1 class="font-h1 text-h1 text-on-surface mb-stack-sm">Contribute Material</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Upload your study resources, past exams, or research papers to help the SYSU community.</p>
</div>
<form class="space-y-stack-lg bg-surface-container-lowest p-6 border border-surface-variant rounded-xl shadow-sm">
<!-- Title Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="title">Resource Title</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded text-body-md font-body-md text-on-surface px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-outline transition-colors" id="title" name="title" placeholder="e.g., Introduction to Calculus Final 2023" type="text"/>
</div>
<!-- Category Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-3">Category</label>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<label class="relative flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
<input checked="" class="h-4 w-4 text-primary border-outline-variant focus:ring-primary" name="category" type="radio" value="exams"/>
<span class="ml-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="quiz">quiz</span>
<span class="font-body-sm text-body-sm text-on-surface">Past Exams</span>
</span>
</label>
<label class="relative flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
<input class="h-4 w-4 text-primary border-outline-variant focus:ring-primary" name="category" type="radio" value="materials"/>
<span class="ml-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="description">description</span>
<span class="font-body-sm text-body-sm text-on-surface">Study Materials</span>
</span>
</label>
<label class="relative flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
<input class="h-4 w-4 text-primary border-outline-variant focus:ring-primary" name="category" type="radio" value="research"/>
<span class="ml-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="article">article</span>
<span class="font-body-sm text-body-sm text-on-surface">Research Papers</span>
</span>
</label>
</div>
</div>
<!-- Description Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="description">Description</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded text-body-md font-body-md text-on-surface px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-outline transition-colors resize-y" id="description" name="description" placeholder="Briefly describe the contents, relevant course codes, or any other useful details..." rows="4"></textarea>
</div>
<!-- File Upload Zone -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2">File Upload</label>
<div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-outline-variant border-dashed rounded-xl hover:bg-surface-container-low hover:border-primary transition-colors cursor-pointer group">
<div class="space-y-1 text-center">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary transition-colors" data-icon="cloud_upload">cloud_upload</span>
<div class="flex text-body-sm font-body-sm text-on-surface-variant justify-center mt-4">
<label class="relative cursor-pointer bg-white rounded-md font-medium text-primary hover:text-primary-container focus-within:outline-none" for="file-upload">
<span>Upload a file</span>
<input class="sr-only" id="file-upload" name="file-upload" type="file"/>
</label>
<p class="pl-1">or drag and drop</p>
</div>
<p class="text-xs text-outline font-label-caps uppercase mt-2">
                            PDF, DOCX, ZIP up to 50MB
                        </p>
</div>
</div>
</div>
<!-- Submit Actions -->
<div class="flex items-center justify-end gap-4 pt-4 border-t border-surface-variant">
<button class="px-6 py-2.5 font-label-md text-label-md text-primary bg-surface-container-lowest border border-primary rounded hover:bg-surface-container-low transition-colors" type="button">
                    Cancel
                </button>
<button class="px-6 py-2.5 font-label-md text-label-md text-on-primary bg-primary rounded hover:bg-primary-container transition-colors shadow-sm" type="submit">
                    Submit Material
                </button>
</div>
</form>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-white dark:bg-gray-950 font-inter text-[11px] font-medium docked full-width bottom-0 border-t border-t border-gray-200 dark:border-gray-800 flat no shadows fixed bottom-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-white/80 backdrop-blur-md">
<a class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 pt-1 hover:text-blue-500 dark:hover:text-blue-300 active:opacity-70 transition-all w-full h-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span>Home</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 pt-1 hover:text-blue-500 dark:hover:text-blue-300 active:opacity-70 transition-all w-full h-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span>Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 border-t-2 border-blue-600 pt-1 hover:text-blue-500 dark:hover:text-blue-300 active:opacity-70 transition-all w-full h-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span>Upload</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 pt-1 hover:text-blue-500 dark:hover:text-blue-300 active:opacity-70 transition-all w-full h-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="bookmark">bookmark</span>
<span>Saved</span>
</a>
</nav>
</body></html>
